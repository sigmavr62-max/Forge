<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Shell</title>
  <link rel="stylesheet" href="https://static.rbxcdn.com/css/page___86580556e80931665a837c768997a391_m.css">
  <style>
    /* Basic padding to account for the fixed header */
    body {
      margin: 0;
      padding-top: 60px;
      background-color: #f4f4f4;
    }
    
    /* Ensure the logo icons are visible if the stylesheet is missing */
    .icon-logo, .icon-logo-r {
      display: inline-block;
      vertical-align: middle;
    }

    /* Custom scrollbar for the left nav flex container */
    .scroll-y {
      overflow-y: auto;
      max-height: 100vh;
    }

    /* RoExport Custom Style integration */
    #nav-roexport:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div id="navigation-container" class="builder-font ixp-marketplace-rename-treatment" data-number-of-autocomplete-suggestions="7" data-is-redirect-library-to-creator-marketplace-enabled="True" data-platform-event-left-nav-entry-start-time="10/23/2025 16:00:00" data-platform-event-left-nav-entry-end-time="11/03/2025 17:00:00" data-platform-event-left-nav-url="https://www.roblox.com/spotlight/halloween-spotlight">
    
    <div id="header" class="navbar-fixed-top rbx-header" role="navigation"> 
      <div class="container-fluid"> 
        <div class="rbx-navbar-header"> 
          <div id="header-menu-icon" class="rbx-nav-collapse">
            <button type="button" class="btn-primary-xs btn-min-width" id="skip-to-main-content">Skip to Main Content</button>
            <button type="button" class="menu-button btn-navigation-nav-menu-md" title="nav menu"><span class="icon-nav-menu"></span></button>
          </div> 
          <div class="navbar-header"> 
            <a id="nav-logo-link" class="navbar-brand" href="/home"> <span class="icon-logo"></span><span class="icon-logo-r"></span> </a> 
          </div> 
        </div> 

        <ul class="nav rbx-navbar hidden-xs hidden-sm col-md-5 col-lg-4"> 
          <li> <a id="nav-charts-md-link" class="font-header-2 nav-menu-title text-header" href="/charts">Charts</a> </li> 
          <li> <a id="nav-marketplace-md-link" class="font-header-2 nav-menu-title text-header" href="/catalog">Marketplace</a> </li> 
          <li> <a id="header-develop-md-link" class="font-header-2 nav-menu-title text-header" href="https://create.roblox.com/">Create</a> </li> 
          <li id="navigation-robux-container"><div><a class="font-header-2 nav-menu-title text-header robux-menu-btn" href="https://www.roblox.com/upgrades/robux?ctx=navpopover">Robux</a></div></li> 
        </ul> 

        <div id="right-navigation-header">
          <div data-testid="navigation-search-input" class="navbar-left navbar-search col-xs-5 col-sm-6 col-md-2 col-lg-3 shown" role="search">
            <div class="input-group">
              <form name="search-form" action="/search">
                <div class="form-has-feedback">
                  <input id="navbar-search-input" type="search" name="search-bar" class="form-control input-field new-input-field" placeholder="Search" maxlength="120">
                </div>
              </form>
              <div class="input-group-btn">
                <button class="input-addon-btn" type="submit"><span class="icon-common-search-sm"></span></button>
              </div>
            </div>
          </div>

          <div class="navbar-right rbx-navbar-right">
            <ul class="nav navbar-right rbx-navbar-icon-group">
              <div class="age-bracket-label text-header">
                <a class="text-link dynamic-overflow-container" href="/users/profile">
                  <span class="avatar avatar-headshot-xs">
                    <span class="thumbnail-2d-container avatar-card-image">
                      <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-7760407A58BC7AE8CA454DA3CC94FCFB-Png/150/150/AvatarHeadshot/Webp/noFilter" alt="polar">
                    </span>
                  </span>
                  <span class="text-overflow age-bracket-label-username font-caption-header">polar</span>
                </a>
              </div>
              <li id="navbar-robux" class="navbar-icon-item">
                <button type="button" class="btn-navigation-nav-robux-md">
                  <span id="nav-robux-icon" class="nav-robux-icon rbx-menu-item">
                    <span class="icon-robux-28x28" id="nav-robux"></span>
                    <span class="rbx-text-navbar-right text-header" id="nav-robux-amount">0</span>
                  </span>
                </button>
              </li>
            </ul>
          </div>
        </div> 
      </div> 
    </div> 

    <div id="left-navigation-container">
      <div class="left-nav fixed left-[0] z-[1001] bg-surface-0">
        <div class="flex width-[289px] height-full scroll-y">
          <div class="width-[288px]">
            <div class="padding-x-large padding-y-medium flex flex-col gap-large">
              <nav>
                <ul class="flex flex-col gap-small">
                  <li>
                    <a href="/users/profile" class="content-emphasis text-title-large flex items-center gap-small padding-left-xsmall radius-medium relative">
                      <span class="size-1000 flex justify-center items-center">
                        <span class="radius-circle clip size-600">
                          <span class="thumbnail-2d-container">
                            <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-7760407A58BC7AE8CA454DA3CC94FCFB-Png/150/150/AvatarHeadshot/Webp/noFilter" alt="polar">
                          </span>
                        </span>
                      </span>
                      <span>polar</span>
                    </a>
                  </li>
                  <li>
                    <a href="/home" class="content-emphasis text-title-large flex items-center gap-small padding-left-xsmall radius-medium bg-surface-300">
                      <span class="size-1000 flex justify-center items-center"><span class="icon icon-regular-house"></span></span>
                      <span>Home</span>
                    </a>
                  </li>
                  <li>
                    <a href="#" id="nav-roexport" class="content-emphasis text-title-large flex items-center gap-small radius-medium" style="background: linear-gradient(135deg, rgb(94, 203, 140) 0%, rgb(45, 138, 78) 100%); justify-content: center; padding: 10px; color: white;">
                      <span class="min-width-0 text-truncate-end">RoExport</span>
                    </a>
                  </li>
                  <li>
                    <a href="/premium" class="foundation-web-button relative flex items-center justify-center bg-action-standard radius-medium height-1000" style="color: white;">
                      <span>Get Premium</span>
                    </a>
                  </li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </div> 

    <div id="verificationUpsell-container"></div>
    <div id="navigation-account-switcher-container"></div>
  </div>

</body>
</html>
